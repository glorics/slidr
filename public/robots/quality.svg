<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 70" width="64" height="70">
  <!-- Star antenna -->
  <polygon points="32,0 34,6 40,6 35,10 37,16 32,12 27,16 29,10 24,6 30,6" fill="currentColor"/>
  <!-- Head -->
  <rect x="18" y="18" width="28" height="22" rx="4" fill="currentColor"/>
  <!-- Eyes: one raised (inspecting) -->
  <rect x="25" y="27" width="5" height="4" rx="1" fill="#FFFFFF"/>
  <rect x="34" y="24" width="5" height="4" rx="1" fill="#FFFFFF"/>
  <!-- Monocle -->
  <circle cx="36.5" cy="26" r="5" fill="none" stroke="currentColor" stroke-width="1.2"/>
  <!-- Body -->
  <rect x="22" y="43" width="20" height="16" rx="3" fill="currentColor"/>
  <!-- Arms -->
  <rect x="14" y="45" width="6" height="10" rx="2" fill="currentColor"/>
  <rect x="44" y="45" width="6" height="10" rx="2" fill="currentColor"/>
  <!-- Legs -->
  <rect x="25" y="61" width="5" height="8" rx="2" fill="currentColor"/>
  <rect x="34" y="61" width="5" height="8" rx="2" fill="currentColor"/>
  <!-- Chest: diamond/gem quality mark -->
  <polygon points="32,47 36,51 32,56 28,51" fill="none" stroke="#FFFFFF" stroke-width="1.2"/>
  <line x1="28" y1="51" x2="36" y2="51" stroke="#FFFFFF" stroke-width="0.8"/>
</svg>
