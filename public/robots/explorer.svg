<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 70" width="64" height="70">
  <!-- Antenna: radar dish -->
  <line x1="32" y1="10" x2="32" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <path d="M24,6 Q32,14 40,6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="4" r="2" fill="currentColor"/>
  <!-- Head -->
  <rect x="18" y="18" width="28" height="22" rx="4" fill="currentColor"/>
  <!-- Eyes: one normal, one magnifying glass -->
  <rect x="25" y="25" width="5" height="5" rx="1" fill="#FFFFFF"/>
  <circle cx="37" cy="27" r="4" fill="none" stroke="#FFFFFF" stroke-width="1.5"/>
  <line x1="40" y1="30" x2="43" y2="33" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="22" y="43" width="20" height="16" rx="3" fill="currentColor"/>
  <!-- Arms -->
  <rect x="14" y="45" width="6" height="10" rx="2" fill="currentColor"/>
  <rect x="44" y="45" width="6" height="10" rx="2" fill="currentColor"/>
  <!-- Legs -->
  <rect x="25" y="61" width="5" height="8" rx="2" fill="currentColor"/>
  <rect x="34" y="61" width="5" height="8" rx="2" fill="currentColor"/>
  <!-- Chest: globe -->
  <circle cx="32" cy="51" r="5" fill="none" stroke="#FFFFFF" stroke-width="1"/>
  <ellipse cx="32" cy="51" rx="2.5" ry="5" fill="none" stroke="#FFFFFF" stroke-width="0.8"/>
  <line x1="27" y1="51" x2="37" y2="51" stroke="#FFFFFF" stroke-width="0.8"/>
</svg>
