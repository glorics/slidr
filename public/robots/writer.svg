<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 70" width="64" height="70">
  <!-- Antenna -->
  <line x1="32" y1="8" x2="32" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <circle cx="32" cy="6" r="3" fill="currentColor"/>
  <!-- Head -->
  <rect x="18" y="18" width="28" height="22" rx="4" fill="currentColor"/>
  <!-- Eyes -->
  <rect x="25" y="25" width="5" height="5" rx="1" fill="#FFFFFF"/>
  <rect x="34" y="25" width="5" height="5" rx="1" fill="#FFFFFF"/>
  <!-- Body -->
  <rect x="22" y="43" width="20" height="16" rx="3" fill="currentColor"/>
  <!-- Left arm -->
  <rect x="14" y="45" width="6" height="10" rx="2" fill="currentColor"/>
  <!-- Right arm holding pen -->
  <rect x="44" y="43" width="6" height="14" rx="2" fill="currentColor"/>
  <!-- Pen -->
  <rect x="51" y="40" width="3" height="16" rx="1" fill="currentColor"/>
  <polygon points="51,56 54,56 52.5,62" fill="currentColor"/>
  <!-- Legs -->
  <rect x="25" y="61" width="5" height="8" rx="2" fill="currentColor"/>
  <rect x="34" y="61" width="5" height="8" rx="2" fill="currentColor"/>
  <!-- Chest: text lines -->
  <line x1="27" y1="49" x2="37" y2="49" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="27" y1="52" x2="35" y2="52" stroke="#FFFFFF" stroke-width="1"/>
  <line x1="27" y1="55" x2="33" y2="55" stroke="#FFFFFF" stroke-width="1"/>
</svg>
