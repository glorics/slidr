<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoCarousel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0A;
  --surface: #141414;
  --surface-2: #1E1E1E;
  --border: #2A2A2A;
  --text: #FFFFFF;
  --text-muted: #888888;
  --accent: #D97757;
  --accent-hover: #E08A6A;
  --accent-dim: rgba(217, 119, 87, 0.12);
  --radius: 12px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* === HEADER === */
.header {
  padding: 24px 40px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.02em;
}

.logo span { color: var(--accent); }

.header-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 13px;
  margin-left: 24px;
}
.header-links a:hover { color: var(--text); }

/* === MAIN === */
.main {
  max-width: 720px;
  margin: 0 auto;
  padding: 60px 24px;
}

.hero-title {
  font-size: 40px;
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -0.03em;
  margin-bottom: 12px;
}

.hero-sub {
  font-size: 16px;
  color: var(--text-muted);
  margin-bottom: 48px;
  line-height: 1.5;
}

/* === FORM === */
.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.url-input {
  width: 100%;
  padding: 16px 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.2s;
}

.url-input:focus {
  border-color: var(--accent);
}

.url-input::placeholder {
  color: #555;
}

/* Format selector */
.format-options {
  display: flex;
  gap: 10px;
}

.format-option {
  flex: 1;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text-muted);
  font-size: 14px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
}

.format-option:hover {
  border-color: #444;
  color: var(--text);
}

.format-option.active {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: var(--accent);
}

.format-option .ratio { font-weight: 700; display: block; margin-bottom: 2px; }
.format-option .dims { font-size: 11px; color: var(--text-muted); }

.color-swatch {
  display: block;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  margin: 0 auto 4px;
  border: 2px solid rgba(255,255,255,0.15);
  transition: transform 0.2s, border-color 0.2s;
}
.color-option.active .color-swatch {
  transform: scale(1.2);
  border-color: rgba(255,255,255,0.6);
}

/* Custom color picker accordion */
.custom-picker-panel {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease, margin-top 0.3s ease, opacity 0.3s ease;
  opacity: 0;
  margin-top: 0;
}
.custom-picker-panel.open {
  max-height: 120px;
  opacity: 1;
  margin-top: 12px;
}
.custom-picker-inner {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
}
.custom-picker-row {
  display: flex;
  align-items: center;
  gap: 16px;
}
.custom-picker-row input[type="color"] {
  width: 48px;
  height: 48px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background: none;
  padding: 0;
}
.custom-picker-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
.custom-picker-row input[type="color"]::-webkit-color-swatch { border: 2px solid var(--border); border-radius: 10px; }
.custom-picker-row input[type="color"]::-moz-color-swatch { border: 2px solid var(--border); border-radius: 10px; }
.custom-picker-info {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.custom-picker-label {
  font-size: 13px;
  color: var(--text-muted);
}
.custom-picker-hex {
  width: 100px;
  padding: 6px 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  outline: none;
}
.custom-picker-hex:focus { border-color: var(--accent); }
.custom-picker-preview {
  width: 48px;
  height: 48px;
  border-radius: 10px;
  border: 2px solid var(--border);
  transition: background 0.2s;
}

/* Theme previews */
.theme-preview {
  display: block;
  width: 32px;
  height: 24px;
  border-radius: 6px;
  margin: 0 auto 4px;
  border: 2px solid rgba(255,255,255,0.15);
  position: relative;
  overflow: hidden;
}
.theme-option.active .theme-preview {
  border-color: rgba(255,255,255,0.6);
  transform: scale(1.1);
  transition: transform 0.2s;
}
.dark-preview { background: #0D0D0D; }
.dark-preview::after { content: 'A'; position: absolute; top: 2px; left: 50%; transform: translateX(-50%); font-size: 12px; font-weight: 700; color: #FFF; }
.light-preview { background: #FFFFFF; }
.light-preview::after { content: 'A'; position: absolute; top: 2px; left: 50%; transform: translateX(-50%); font-size: 12px; font-weight: 700; color: #1A1A1A; }
.navy-preview { background: #1A1B2E; }
.navy-preview::after { content: 'A'; position: absolute; top: 2px; left: 50%; transform: translateX(-50%); font-size: 12px; font-weight: 700; color: #E8E8F0; }
.warm-preview { background: #F5F0EB; }
.warm-preview::after { content: 'A'; position: absolute; top: 2px; left: 50%; transform: translateX(-50%); font-size: 12px; font-weight: 700; color: #2C2420; }
.custom-theme-preview { background: linear-gradient(135deg, #333 50%, #ccc 50%); }
.custom-theme-preview::after { content: '?'; position: absolute; top: 2px; left: 50%; transform: translateX(-50%); font-size: 12px; font-weight: 700; color: #FFF; }

/* Theme picker panel */
.theme-pick-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}
.theme-pick-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.theme-pick-row input[type="color"] {
  width: 36px;
  height: 36px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: none;
  padding: 0;
}
.theme-pick-row input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
.theme-pick-row input[type="color"]::-webkit-color-swatch { border: 2px solid var(--border); border-radius: 8px; }
.theme-pick-row input[type="color"]::-moz-color-swatch { border: 2px solid var(--border); border-radius: 8px; }
.theme-mini-preview {
  width: 64px;
  height: 64px;
  border-radius: 10px;
  border: 2px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0D0D0D;
  flex-shrink: 0;
}
.theme-mini-preview .tmp-text {
  font-size: 24px;
  font-weight: 800;
  color: #FFFFFF;
}

/* Generate button */
.btn-generate {
  width: 100%;
  padding: 18px;
  background: var(--accent);
  color: #FFFFFF;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: background 0.2s;
  margin-top: 8px;
}

.btn-generate:hover { background: var(--accent-hover); }
.btn-generate:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* === PROGRESS === */
.progress-section {
  display: none;
  margin-top: 40px;
}

.progress-section.visible { display: block; }

.progress-bar-wrap {
  height: 4px;
  background: var(--surface-2);
  border-radius: 2px;
  margin-bottom: 16px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  width: 0%;
  transition: width 0.5s ease;
}

.progress-log {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  max-height: 180px;
  overflow-y: auto;
  font-size: 13px;
  font-family: 'SF Mono', 'Fira Code', monospace;
  color: var(--text-muted);
  line-height: 1.8;
}

.progress-log .log-line {
  display: flex;
  gap: 10px;
}

.progress-log .log-step {
  color: var(--accent);
  font-weight: 600;
  min-width: 80px;
}

/* === RESULTS === */
.results-section {
  display: none;
  margin-top: 48px;
}

.results-section.visible { display: block; }

.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.results-header h2 {
  font-size: 20px;
  font-weight: 700;
}

.btn-download {
  padding: 10px 24px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  text-decoration: none;
  transition: border-color 0.2s;
}

.btn-download:hover { border-color: var(--accent); color: var(--accent); }

.slides-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
}

.slide-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color 0.2s;
}

.slide-card:hover { border-color: #444; }

.slide-card img {
  width: 100%;
  display: block;
}

.slide-card .slide-label {
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-muted);
}

/* === ERROR === */
.error-msg {
  display: none;
  margin-top: 20px;
  padding: 16px 20px;
  background: rgba(220, 53, 69, 0.1);
  border: 1px solid rgba(220, 53, 69, 0.3);
  border-radius: var(--radius);
  color: #FF6B7A;
  font-size: 14px;
}

.error-msg.visible { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">Auto<span>Carousel</span></div>
  <div class="header-links">
    <a href="/health">API Status</a>
    <a href="/logout">Logout</a>
  </div>
</div>

<div class="main">
  <h1 class="hero-title">URL &rarr; Carousel</h1>
  <p class="hero-sub">Paste any URL. Get annotated tutorial slides ready for LinkedIn, Instagram &amp; more.</p>

  <!-- Form -->
  <div class="form-group">
    <label>URL</label>
    <input type="url" class="url-input" id="urlInput" placeholder="https://docs.anthropic.com/en/docs/..." autofocus>
  </div>

  <div class="form-group">
    <label>Language</label>
    <div class="format-options">
      <button class="format-option active" data-lang="en" onclick="selectLang(this)">
        <span class="ratio">EN</span>
        <span class="dims">English</span>
      </button>
      <button class="format-option" data-lang="fr" onclick="selectLang(this)">
        <span class="ratio">FR</span>
        <span class="dims">French</span>
      </button>
      <button class="format-option" data-lang="es" onclick="selectLang(this)">
        <span class="ratio">ES</span>
        <span class="dims">Spanish</span>
      </button>
      <button class="format-option" data-lang="de" onclick="selectLang(this)">
        <span class="ratio">DE</span>
        <span class="dims">German</span>
      </button>
    </div>
  </div>

  <div class="form-group">
    <label>Format</label>
    <div class="format-options">
      <button class="format-option" data-format="3:4" onclick="selectFormat(this)">
        <span class="ratio">3:4</span>
        <span class="dims">1080 &times; 1440</span>
      </button>
      <button class="format-option active" data-format="4:5" onclick="selectFormat(this)">
        <span class="ratio">4:5</span>
        <span class="dims">1080 &times; 1350</span>
      </button>
      <button class="format-option" data-format="9:16" onclick="selectFormat(this)">
        <span class="ratio">9:16</span>
        <span class="dims">1080 &times; 1920</span>
      </button>
    </div>
  </div>

  <div class="form-group">
    <label>Slides</label>
    <div class="format-options">
      <button class="format-option" data-slides="5" onclick="selectSlides(this)">
        <span class="ratio">5</span>
        <span class="dims">Short</span>
      </button>
      <button class="format-option active" data-slides="7" onclick="selectSlides(this)">
        <span class="ratio">7</span>
        <span class="dims">Standard</span>
      </button>
      <button class="format-option" data-slides="9" onclick="selectSlides(this)">
        <span class="ratio">9</span>
        <span class="dims">Detailed</span>
      </button>
    </div>
  </div>

  <div class="form-group">
    <label>Theme</label>
    <div class="format-options">
      <button class="format-option theme-option active" data-bg="#0D0D0D" data-text="#FFFFFF" onclick="selectTheme(this)">
        <span class="theme-preview dark-preview"></span>
        <span class="dims">Dark</span>
      </button>
      <button class="format-option theme-option" data-bg="#FFFFFF" data-text="#1A1A1A" onclick="selectTheme(this)">
        <span class="theme-preview light-preview"></span>
        <span class="dims">Light</span>
      </button>
      <button class="format-option theme-option" data-bg="#1A1B2E" data-text="#E8E8F0" onclick="selectTheme(this)">
        <span class="theme-preview navy-preview"></span>
        <span class="dims">Navy</span>
      </button>
      <button class="format-option theme-option" data-bg="#F5F0EB" data-text="#2C2420" onclick="selectTheme(this)">
        <span class="theme-preview warm-preview"></span>
        <span class="dims">Warm</span>
      </button>
      <button class="format-option theme-option" id="customThemeBtn" onclick="toggleThemePicker()">
        <span class="theme-preview custom-theme-preview" id="customThemePreview"></span>
        <span class="dims">Custom</span>
      </button>
    </div>
    <div class="custom-picker-panel" id="themePickerPanel">
      <div class="custom-picker-inner">
        <div class="custom-picker-row">
          <div class="theme-pick-group">
            <span class="custom-picker-label">Background</span>
            <div class="theme-pick-row">
              <input type="color" id="bgPicker" value="#0D0D0D" oninput="pickThemeColors()">
              <input type="text" class="custom-picker-hex" id="bgHexInput" value="#0D0D0D" maxlength="7" oninput="pickThemeHex()">
            </div>
          </div>
          <div class="theme-pick-group">
            <span class="custom-picker-label">Text</span>
            <div class="theme-pick-row">
              <input type="color" id="textPicker" value="#FFFFFF" oninput="pickThemeColors()">
              <input type="text" class="custom-picker-hex" id="textHexInput" value="#FFFFFF" maxlength="7" oninput="pickThemeHex()">
            </div>
          </div>
          <div class="theme-mini-preview" id="themeMiniPreview">
            <span class="tmp-text">Aa</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="form-group">
    <label>Accent Color</label>
    <div class="format-options" id="colorOptions">
      <button class="format-option color-option active" data-color="#D97757" onclick="selectColor(this)" title="Terra Cotta">
        <span class="color-swatch" style="background:#D97757"></span>
        <span class="dims">Terra Cotta</span>
      </button>
      <button class="format-option color-option" data-color="#E05C8A" onclick="selectColor(this)" title="Pink">
        <span class="color-swatch" style="background:#E05C8A"></span>
        <span class="dims">Pink</span>
      </button>
      <button class="format-option color-option" data-color="#7C5CFC" onclick="selectColor(this)" title="Purple">
        <span class="color-swatch" style="background:#7C5CFC"></span>
        <span class="dims">Purple</span>
      </button>
      <button class="format-option color-option" data-color="#3B9EFF" onclick="selectColor(this)" title="Blue">
        <span class="color-swatch" style="background:#3B9EFF"></span>
        <span class="dims">Blue</span>
      </button>
      <button class="format-option color-option" data-color="#2ECC71" onclick="selectColor(this)" title="Green">
        <span class="color-swatch" style="background:#2ECC71"></span>
        <span class="dims">Green</span>
      </button>
      <button class="format-option color-option" data-color="#F1C40F" onclick="selectColor(this)" title="Gold">
        <span class="color-swatch" style="background:#F1C40F"></span>
        <span class="dims">Gold</span>
      </button>
      <button class="format-option color-option" id="customColorBtn" onclick="toggleCustomPicker()" title="Custom">
        <span class="color-swatch" id="customSwatch" style="background:#888"></span>
        <span class="dims">Custom</span>
      </button>
    </div>
    <div class="custom-picker-panel" id="customPickerPanel">
      <div class="custom-picker-inner">
        <div class="custom-picker-row">
          <input type="color" id="colorPicker" value="#D97757" oninput="pickCustomColor(this.value)">
          <div class="custom-picker-info">
            <span class="custom-picker-label">Pick any color</span>
            <input type="text" class="custom-picker-hex" id="hexInput" value="#D97757" maxlength="7" placeholder="#000000" oninput="pickCustomHex(this.value)">
          </div>
          <div class="custom-picker-preview" id="customPreview" style="background:#D97757"></div>
        </div>
      </div>
    </div>
  </div>

  <button class="btn-generate" id="btnGenerate" onclick="generate()">Generate Carousel</button>

  <div class="error-msg" id="errorMsg"></div>

  <!-- Progress -->
  <div class="progress-section" id="progressSection">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="progress-log" id="progressLog"></div>
  </div>

  <!-- Results -->
  <div class="results-section" id="resultsSection">
    <div class="results-header">
      <h2 id="resultsTitle">Carousel</h2>
      <a class="btn-download" id="btnDownload" href="#">Download ZIP</a>
    </div>
    <div class="slides-grid" id="slidesGrid"></div>
  </div>
</div>

<script>
let selectedFormat = localStorage.getItem('ac_format') || '4:5';
let selectedLang = localStorage.getItem('ac_lang') || 'en';
let selectedSlides = parseInt(localStorage.getItem('ac_slides')) || 7;
let selectedColor = localStorage.getItem('ac_color') || '#D97757';
let selectedBg = localStorage.getItem('ac_bg') || '#0D0D0D';
let selectedText = localStorage.getItem('ac_text') || '#FFFFFF';

// Restore saved preferences on load
document.addEventListener('DOMContentLoaded', () => {
  // Restore format
  document.querySelectorAll('[data-format]').forEach(b => {
    b.classList.toggle('active', b.dataset.format === selectedFormat);
  });
  // Restore language
  document.querySelectorAll('[data-lang]').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === selectedLang);
  });
  // Restore slides
  document.querySelectorAll('[data-slides]').forEach(b => {
    b.classList.toggle('active', b.dataset.slides === String(selectedSlides));
  });
  // Restore theme
  const themeMatch = document.querySelector(`.theme-option[data-bg="${selectedBg}"][data-text="${selectedText}"]`);
  document.querySelectorAll('.theme-option').forEach(b => b.classList.remove('active'));
  if (themeMatch) {
    themeMatch.classList.add('active');
  } else {
    document.getElementById('customThemeBtn').classList.add('active');
    document.getElementById('bgPicker').value = selectedBg;
    document.getElementById('textPicker').value = selectedText;
    document.getElementById('bgHexInput').value = selectedBg;
    document.getElementById('textHexInput').value = selectedText;
    updateThemeMiniPreview();
    document.getElementById('themePickerPanel').classList.add('open');
  }

  // Restore color — check if it matches a preset, otherwise activate custom
  const presetMatch = document.querySelector(`[data-color="${selectedColor}"]`);
  document.querySelectorAll('#colorOptions .color-option').forEach(b => b.classList.remove('active'));
  if (presetMatch) {
    presetMatch.classList.add('active');
  } else {
    document.getElementById('customColorBtn').classList.add('active');
    document.getElementById('customSwatch').style.background = selectedColor;
    document.getElementById('colorPicker').value = selectedColor;
    document.getElementById('hexInput').value = selectedColor;
    document.getElementById('customPreview').style.background = selectedColor;
    document.getElementById('customPickerPanel').classList.add('open');
  }
  // Apply accent color to UI
  applyAccentColor(selectedColor);
});

function selectFormat(btn) {
  btn.parentElement.querySelectorAll('.format-option').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedFormat = btn.dataset.format;
  localStorage.setItem('ac_format', selectedFormat);
}

function selectLang(btn) {
  btn.parentElement.querySelectorAll('.format-option').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedLang = btn.dataset.lang;
  localStorage.setItem('ac_lang', selectedLang);
}

function selectTheme(btn) {
  btn.parentElement.querySelectorAll('.theme-option').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedBg = btn.dataset.bg;
  selectedText = btn.dataset.text;
  localStorage.setItem('ac_bg', selectedBg);
  localStorage.setItem('ac_text', selectedText);
  document.getElementById('themePickerPanel').classList.remove('open');
}

function toggleThemePicker() {
  const panel = document.getElementById('themePickerPanel');
  const isOpen = panel.classList.contains('open');
  if (isOpen) {
    panel.classList.remove('open');
  } else {
    panel.classList.add('open');
    document.getElementById('bgPicker').value = selectedBg;
    document.getElementById('textPicker').value = selectedText;
    document.getElementById('bgHexInput').value = selectedBg;
    document.getElementById('textHexInput').value = selectedText;
    updateThemeMiniPreview();
  }
  document.querySelectorAll('.theme-option').forEach(b => b.classList.remove('active'));
  document.getElementById('customThemeBtn').classList.add('active');
}

function pickThemeColors() {
  selectedBg = document.getElementById('bgPicker').value;
  selectedText = document.getElementById('textPicker').value;
  document.getElementById('bgHexInput').value = selectedBg;
  document.getElementById('textHexInput').value = selectedText;
  localStorage.setItem('ac_bg', selectedBg);
  localStorage.setItem('ac_text', selectedText);
  updateThemeMiniPreview();
  document.querySelectorAll('.theme-option').forEach(b => b.classList.remove('active'));
  document.getElementById('customThemeBtn').classList.add('active');
}

function pickThemeHex() {
  const bg = document.getElementById('bgHexInput').value;
  const text = document.getElementById('textHexInput').value;
  if (/^#[0-9A-Fa-f]{6}$/.test(bg)) {
    selectedBg = bg;
    document.getElementById('bgPicker').value = bg;
    localStorage.setItem('ac_bg', selectedBg);
  }
  if (/^#[0-9A-Fa-f]{6}$/.test(text)) {
    selectedText = text;
    document.getElementById('textPicker').value = text;
    localStorage.setItem('ac_text', selectedText);
  }
  updateThemeMiniPreview();
}

function updateThemeMiniPreview() {
  const prev = document.getElementById('themeMiniPreview');
  prev.style.background = selectedBg;
  prev.querySelector('.tmp-text').style.color = selectedText;
}

function selectSlides(btn) {
  btn.parentElement.querySelectorAll('.format-option').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedSlides = parseInt(btn.dataset.slides);
  localStorage.setItem('ac_slides', selectedSlides);
}

function selectColor(btn) {
  btn.parentElement.querySelectorAll('.format-option').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedColor = btn.dataset.color;
  localStorage.setItem('ac_color', selectedColor);
  applyAccentColor(selectedColor);
  // Close custom picker if open
  document.getElementById('customPickerPanel').classList.remove('open');
}

function toggleCustomPicker() {
  const panel = document.getElementById('customPickerPanel');
  const isOpen = panel.classList.contains('open');
  if (isOpen) {
    panel.classList.remove('open');
  } else {
    panel.classList.add('open');
    // Set picker to current custom color
    document.getElementById('colorPicker').value = selectedColor;
    document.getElementById('hexInput').value = selectedColor;
    document.getElementById('customPreview').style.background = selectedColor;
  }
  // Activate custom button
  document.querySelectorAll('#colorOptions .color-option').forEach(b => b.classList.remove('active'));
  document.getElementById('customColorBtn').classList.add('active');
}

function pickCustomColor(color) {
  document.querySelectorAll('#colorOptions .color-option').forEach(b => b.classList.remove('active'));
  document.getElementById('customColorBtn').classList.add('active');
  document.getElementById('customSwatch').style.background = color;
  document.getElementById('hexInput').value = color;
  document.getElementById('customPreview').style.background = color;
  selectedColor = color;
  localStorage.setItem('ac_color', selectedColor);
  applyAccentColor(selectedColor);
}

function pickCustomHex(value) {
  if (/^#[0-9A-Fa-f]{6}$/.test(value)) {
    document.getElementById('colorPicker').value = value;
    document.getElementById('customSwatch').style.background = value;
    document.getElementById('customPreview').style.background = value;
    selectedColor = value;
    localStorage.setItem('ac_color', selectedColor);
    applyAccentColor(selectedColor);
  }
}

function applyAccentColor(color) {
  document.documentElement.style.setProperty('--accent', color);
  // Compute hover (lighter) and dim (transparent) variants
  document.documentElement.style.setProperty('--accent-hover', color + 'CC');
  document.documentElement.style.setProperty('--accent-dim', color + '1F');
}

async function generate() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) return;

  const btn = document.getElementById('btnGenerate');
  const progress = document.getElementById('progressSection');
  const results = document.getElementById('resultsSection');
  const errorMsg = document.getElementById('errorMsg');
  const log = document.getElementById('progressLog');
  const bar = document.getElementById('progressBar');

  // Reset
  btn.disabled = true;
  btn.textContent = 'Generating...';
  progress.classList.add('visible');
  results.classList.remove('visible');
  errorMsg.classList.remove('visible');
  log.innerHTML = '';
  bar.style.width = '0%';

  const steps = { scraping: 15, analyzing: 40, searching: 60, capturing: 75, rendering: 90 };

  try {
    const response = await fetch('/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url, format: selectedFormat, language: selectedLang, max_slides: selectedSlides, accent_color: selectedColor, bg_color: selectedBg, text_color: selectedText }),
    });

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      let eventType = '';
      for (const line of lines) {
        if (line.startsWith('event: ')) {
          eventType = line.slice(7).trim();
        } else if (line.startsWith('data: ')) {
          const data = JSON.parse(line.slice(6));

          if (eventType === 'status') {
            addLog(data.step, data.message);
            if (steps[data.step]) {
              bar.style.width = steps[data.step] + '%';
            }
          } else if (eventType === 'complete') {
            bar.style.width = '100%';
            showResults(data);
          } else if (eventType === 'error') {
            throw new Error(data.message);
          }
        }
      }
    }
  } catch (err) {
    errorMsg.textContent = err.message;
    errorMsg.classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Generate Carousel';
  }
}

function addLog(step, message) {
  const log = document.getElementById('progressLog');
  log.innerHTML += `<div class="log-line"><span class="log-step">${step}</span><span>${message}</span></div>`;
  log.scrollTop = log.scrollHeight;
}

function showResults(data) {
  const results = document.getElementById('resultsSection');
  const title = document.getElementById('resultsTitle');
  const grid = document.getElementById('slidesGrid');
  const downloadBtn = document.getElementById('btnDownload');

  title.textContent = data.carousel_title || 'Carousel';
  downloadBtn.href = data.zip_url || '#';
  grid.innerHTML = '';

  for (const slide of data.slides) {
    const card = document.createElement('div');
    card.className = 'slide-card';
    card.innerHTML = `
      <a href="${slide.url}" target="_blank">
        <img src="${slide.url}" alt="Slide ${slide.number}" loading="lazy">
      </a>
      <div class="slide-label">Slide ${slide.number}</div>
    `;
    grid.appendChild(card);
  }

  results.classList.add('visible');
}

// Enter to submit
document.getElementById('urlInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') generate();
});
</script>
